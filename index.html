<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競品訊號站</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10141b;
    --surface:#181f2a;
    --surface-2:#1f2836;
    --paper:#eae7de;
    --paper-dim:#9aa0ad;
    --rule:rgba(234,231,222,0.09);
    --rule-strong:rgba(234,231,222,0.18);
    --brass:#e2793f;
    --caution:#d9a73d;
    --calm:#5fa8a3;
    --font-display:'Big Shoulders Display',sans-serif;
    --font-serif:'Source Serif 4',Georgia,serif;
    --font-mono:'IBM Plex Mono',monospace;
  }

  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  body{
    margin:0;
    background:
      repeating-linear-gradient(0deg, rgba(234,231,222,0.025) 0px, rgba(234,231,222,0.025) 1px, transparent 1px, transparent 28px),
      var(--ink);
    color:var(--paper);
    font-family:var(--font-serif);
    min-height:100vh;
    padding:32px 24px 80px;
  }

  .wrap{max-width:1180px; margin:0 auto;}

  /* ---------- Header ---------- */
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    border-bottom:1px solid var(--rule-strong);
    padding-bottom:20px;
    margin-bottom:20px;
  }
  .title-block h1{
    font-family:var(--font-display);
    font-weight:900;
    font-size:clamp(32px,5vw,52px);
    letter-spacing:0.5px;
    margin:0 0 4px;
    line-height:0.95;
  }
  .title-block .eyebrow{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--calm);
  }
  .status-block{
    text-align:right;
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--paper-dim);
  }
  .status-block .scan-time{
    color:var(--paper);
    font-size:15px;
    display:flex;
    align-items:center;
    gap:8px;
    justify-content:flex-end;
  }
  .pulse{
    width:8px;height:8px;border-radius:50%;
    background:var(--calm);
    box-shadow:0 0 0 0 rgba(95,168,163,0.6);
    animation:pulse 2.4s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(95,168,163,0.5);}
    70%{box-shadow:0 0 0 7px rgba(95,168,163,0);}
    100%{box-shadow:0 0 0 0 rgba(95,168,163,0);}
  }

  /* ---------- Month / date selector ---------- */
  .month-row, .date-row{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .month-row{ margin-bottom:14px; }
  .date-row{ margin-bottom:40px; padding-left:8px; }
  .month-row .month-label, .date-row .date-label{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--paper-dim);
    margin-right:4px;
  }
  .month-pill{
    font-family:var(--font-mono);
    font-size:13px;
    letter-spacing:0.5px;
    background:var(--surface);
    border:1px solid var(--rule-strong);
    color:var(--paper-dim);
    padding:8px 16px;
    border-radius:20px;
    cursor:pointer;
  }
  .month-pill.active{
    background:var(--brass);
    border-color:var(--brass);
    color:var(--ink);
    font-weight:600;
  }
  .date-pill{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.3px;
    background:transparent;
    border:1px solid var(--rule);
    color:var(--paper-dim);
    padding:6px 13px;
    border-radius:14px;
    cursor:pointer;
  }
  .date-pill.active{
    border-color:var(--calm);
    color:var(--paper);
    background:var(--surface-2);
  }
  .month-pill:focus-visible, .date-pill:focus-visible{ outline:2px solid var(--calm); outline-offset:2px; }

  /* ---------- Section headers ---------- */
  .section{ margin-bottom:52px; }
  .section-head{
    display:flex;
    align-items:baseline;
    gap:12px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .section-head h2{
    font-family:var(--font-display);
    font-weight:700;
    font-size:26px;
    margin:0;
  }
  .section-head .eyebrow-sm{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--calm);
  }
  .section-note{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--paper-dim);
    margin-bottom:16px;
  }

  /* ---------- Trends ---------- */
  .trend-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
    gap:16px;
  }
  .trend-card{
    background:var(--surface);
    border:1px solid var(--rule);
    border-left:3px solid var(--calm);
    padding:18px 20px;
  }
  .trend-card h3{
    font-family:var(--font-serif);
    font-weight:600;
    font-size:16.5px;
    margin:0 0 8px;
    color:var(--paper);
  }
  .trend-card p{
    font-size:14px;
    line-height:1.6;
    color:var(--paper-dim);
    margin:0;
  }

  /* ---------- Dial / tab navigation ---------- */
  .dial{
    display:flex;
    gap:2px;
    background:var(--surface);
    border:1px solid var(--rule);
    border-radius:3px;
    padding:4px;
    margin-bottom:8px;
    overflow-x:auto;
  }
  .dial button{
    flex:1;
    min-width:140px;
    background:transparent;
    border:none;
    color:var(--paper-dim);
    font-family:var(--font-mono);
    font-size:12.5px;
    letter-spacing:0.5px;
    padding:13px 14px;
    border-radius:2px;
    cursor:pointer;
    text-align:left;
    position:relative;
    transition:background 0.15s, color 0.15s;
  }
  .dial button .num{
    display:block;
    font-size:10px;
    color:var(--calm);
    margin-bottom:3px;
    letter-spacing:1.5px;
  }
  .dial button .name{
    display:block;
    color:inherit;
    font-size:13.5px;
  }
  .dial button.active{
    background:var(--surface-2);
    color:var(--paper);
  }
  .dial button.active::after{
    content:"";
    position:absolute;
    bottom:-5px; left:14px; right:14px;
    height:2px;
    background:var(--brass);
  }
  .dial button:hover{ color:var(--paper); }
  .dial button:focus-visible{ outline:2px solid var(--calm); outline-offset:2px; }

  .panel-sub{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--paper-dim);
    margin-bottom:20px;
    letter-spacing:0.3px;
  }

  /* ---------- Comparison table ---------- */
  .compare-wrap{
    overflow-x:auto;
    border:1px solid var(--rule);
  }
  table.compare{
    width:100%;
    border-collapse:collapse;
    font-size:14.5px;
    min-width:640px;
  }
  table.compare th, table.compare td{
    padding:14px 16px;
    text-align:left;
    border-bottom:1px solid var(--rule);
    vertical-align:top;
  }
  table.compare thead th{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--paper-dim);
    background:var(--surface);
    border-bottom:1px solid var(--rule-strong);
  }
  table.compare tbody th{
    font-family:var(--font-display);
    font-weight:700;
    font-size:17px;
    color:var(--paper);
    background:var(--surface);
    white-space:nowrap;
    border-right:2px solid var(--brass);
  }
  table.compare tbody tr:hover td{
    background:rgba(234,231,222,0.025);
  }
  table.compare td{ line-height:1.55; color:var(--paper); }
  table.compare td.empty{ color:var(--paper-dim); font-style:italic; }
  table.compare tbody tr.is-us th, table.compare tbody tr.is-us td{
    background:rgba(226,121,63,0.08);
  }
  table.compare tbody tr.is-us th{ border-right-color:var(--brass); }
  table.compare tbody tr.row-continued th{
    color:var(--paper-dim);
    font-size:13px;
    font-weight:500;
  }

  /* ---------- PowerHero SWOT ---------- */
  .swot-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1px;
    background:var(--rule);
    border:1px solid var(--rule);
    margin-bottom:18px;
  }
  .swot-col{ background:var(--surface); padding:22px 24px; }
  .swot-col h3{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin:0 0 16px;
  }
  .swot-col.strength h3{ color:var(--calm); }
  .swot-col.weakness h3{ color:var(--brass); }
  .swot-col ul{ margin:0; padding:0; list-style:none; }
  .swot-col li{
    font-size:14.5px;
    line-height:1.6;
    padding:10px 0;
    border-top:1px solid var(--rule);
  }
  .swot-col li:first-child{ border-top:none; padding-top:0; }
  .reco-box{
    background:var(--surface-2);
    border:1px solid var(--rule-strong);
    border-left:3px solid var(--brass);
    padding:22px 24px;
  }
  .reco-box h3{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--paper);
    margin:0 0 16px;
  }
  .reco-box ol{ margin:0; padding-left:22px; }
  .reco-box li{ font-size:14.5px; line-height:1.65; margin-bottom:12px; }
  .reco-box li:last-child{ margin-bottom:0; }

  @media (max-width:720px){
    .swot-grid{ grid-template-columns:1fr; }
  }

  /* ---------- Log ---------- */
  .filters{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
  .filters button{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:1px;
    background:transparent;
    border:1px solid var(--rule-strong);
    color:var(--paper-dim);
    padding:7px 14px;
    border-radius:2px;
    cursor:pointer;
  }
  .filters button.active{
    border-color:var(--calm);
    color:var(--paper);
    background:var(--surface-2);
  }
  .filters button:focus-visible{ outline:2px solid var(--calm); outline-offset:2px; }

  .log-list{border-top:1px solid var(--rule);}
  .log-row{
    display:grid;
    grid-template-columns:110px 110px 1fr 70px;
    gap:16px;
    align-items:baseline;
    padding:14px 4px;
    border-bottom:1px solid var(--rule);
    font-size:14.5px;
  }
  .log-row .date, .log-row .who{
    font-family:var(--font-mono);
    font-size:12.5px;
    color:var(--paper-dim);
  }
  .log-row .who{color:var(--paper);}
  .log-row .change{line-height:1.5;}
  .sev-tag{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:1px;
    text-align:right;
    text-transform:uppercase;
    align-self:center;
  }
  .sev-high{color:var(--brass);}
  .sev-medium{color:var(--caution);}
  .sev-low{color:var(--calm);}

  @media (max-width:640px){
    .log-row{grid-template-columns:1fr 1fr; row-gap:4px;}
    .log-row .change{grid-column:1/-1; order:3;}
    .log-row .sev-tag{text-align:left;}
    .status-block{text-align:left;}
    header{align-items:flex-start;}
    .dial button{min-width:120px;}
  }

  footer{
    margin-top:8px;
    padding-top:18px;
    border-top:1px solid var(--rule);
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--paper-dim);
    letter-spacing:0.5px;
  }

  .empty-state{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--paper-dim);
    padding:24px;
    border:1px dashed var(--rule-strong);
    text-align:center;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <div class="eyebrow">COMPETITIVE SIGNAL STATION</div>
      <h1>競品訊號站</h1>
    </div>
    <div class="status-block">
      <div class="scan-time"><span class="pulse"></span><span id="lastUpdated">—</span> 最後掃描</div>
      <div id="brandLine">載入中...</div>
    </div>
  </header>

  <div class="month-row" id="monthRow">
    <span class="month-label">查看月份</span>
  </div>
  <div class="date-row" id="dateRow">
    <span class="date-label">查看週期</span>
  </div>

  <section class="section">
    <div class="section-head">
      <h2>本月趨勢與新知</h2>
      <span class="eyebrow-sm">INDUSTRY SIGNAL</span>
    </div>
    <div class="trend-grid" id="trendGrid"></div>
  </section>

  <section class="section">
    <div class="section-head">
      <h2>競品指標比較</h2>
      <span class="eyebrow-sm">FIVE-AXIS COMPARISON</span>
    </div>
    <nav class="dial" id="dial"></nav>
    <div class="panel-sub" id="panelSub"></div>
    <div class="compare-wrap">
      <table class="compare" id="compareTable">
        <thead><tr id="compareHead"></tr></thead>
        <tbody id="compareBody"></tbody>
      </table>
    </div>
  </section>

  <section class="section">
    <div class="section-head">
      <h2>PowerHero 本月優劣勢分析</h2>
      <span class="eyebrow-sm">SELF ASSESSMENT</span>
    </div>
    <div class="swot-grid">
      <div class="swot-col strength">
        <h3>優勢</h3>
        <ul id="strengthList"></ul>
      </div>
      <div class="swot-col weakness">
        <h3>劣勢</h3>
        <ul id="weaknessList"></ul>
      </div>
    </div>
    <div class="reco-box">
      <h3>建議行動</h3>
      <ol id="recoList"></ol>
    </div>
  </section>

  <section class="section log-section">
    <div class="section-head">
      <h2>變化紀錄</h2>
      <span class="eyebrow-sm">SIGNAL LOG · 倒序時間軸</span>
    </div>
    <div class="filters" id="filters">
      <button data-sev="all" class="active">全部</button>
      <button data-sev="high">高</button>
      <button data-sev="medium">中</button>
      <button data-sev="low">低</button>
    </div>
    <div class="log-list" id="logList"></div>
  </section>

  <footer>
    資料來源：tracking-data.json · 由 Claude Code Routine 定期更新
  </footer>

</div>

<script>
const EMPTY_DATA = { snapshots: [] };

async function loadData() {
  try {
    const res = await fetch('./tracking-data.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('not found');
    return await res.json();
  } catch (e) {
    return EMPTY_DATA;
  }
}

function renderMonthRow(allMonths, activeMonth, onSelect) {
  const row = document.getElementById('monthRow');
  row.innerHTML = `<span class="month-label">查看月份</span>` + allMonths.map(m => `
    <button class="month-pill ${m === activeMonth ? 'active' : ''}" data-m="${m}">${m.replace('-', '年')}月</button>
  `).join('');
  row.querySelectorAll('.month-pill').forEach(btn => {
    btn.addEventListener('click', () => onSelect(btn.dataset.m));
  });
}

function renderDateRow(snapshotsInMonth, activeDate, onSelect) {
  const row = document.getElementById('dateRow');
  row.innerHTML = `<span class="date-label">查看週期</span>` + snapshotsInMonth.map(s => `
    <button class="date-pill ${s.date === activeDate ? 'active' : ''}" data-d="${s.date}">${s.date}</button>
  `).join('');
  row.querySelectorAll('.date-pill').forEach(btn => {
    btn.addEventListener('click', () => onSelect(btn.dataset.d));
  });
}

function renderTrends(trends) {
  const grid = document.getElementById('trendGrid');
  if (!trends || trends.length === 0) {
    grid.innerHTML = `<div class="empty-state">本期尚無趨勢資料</div>`;
    return;
  }
  grid.innerHTML = trends.map(t => `
    <div class="trend-card">
      <h3>${t.title}</h3>
      <p>${t.summary}</p>
    </div>
  `).join('');
}

function renderDial(indicators, activeIndex, onSelect) {
  const dial = document.getElementById('dial');
  dial.innerHTML = indicators.map((ind, i) => `
    <button data-i="${i}" class="${i === activeIndex ? 'active' : ''}">
      <span class="num">${String(i + 1).padStart(2, '0')}</span>
      <span class="name">${ind.label}</span>
    </button>
  `).join('');
  dial.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => onSelect(parseInt(btn.dataset.i, 10)));
  });
}

function renderPanel(indicator) {
  document.getElementById('panelSub').textContent = indicator.sub || '';
  const head = document.getElementById('compareHead');
  head.innerHTML = `<th>競品</th>` + indicator.columns.map(c => `<th>${c.label}</th>`).join('');
  const body = document.getElementById('compareBody');
  let lastCompetitor = null;
  body.innerHTML = indicator.rows.map(row => {
    const isUs = /powerhero/i.test(row.competitor) || row.competitor.includes('我方');
    const isContinued = row.competitor === lastCompetitor;
    lastCompetitor = row.competitor;
    const rowClasses = [isUs ? 'is-us' : '', isContinued ? 'row-continued' : ''].filter(Boolean).join(' ');
    return `
    <tr class="${rowClasses}">
      <th scope="row">${row.competitor}</th>
      ${indicator.columns.map(c => {
        const val = row[c.key];
        return val ? `<td>${val}</td>` : `<td class="empty">未取得資料</td>`;
      }).join('')}
    </tr>
  `;
  }).join('');
}

function renderSwot(analysis) {
  const strengthList = document.getElementById('strengthList');
  const weaknessList = document.getElementById('weaknessList');
  const recoList = document.getElementById('recoList');
  if (!analysis) {
    strengthList.innerHTML = `<li>本月尚無分析資料</li>`;
    weaknessList.innerHTML = `<li>本月尚無分析資料</li>`;
    recoList.innerHTML = `<li>本月尚無建議</li>`;
    return;
  }
  strengthList.innerHTML = (analysis.strengths || []).map(s => `<li>${s}</li>`).join('') || '<li>無</li>';
  weaknessList.innerHTML = (analysis.weaknesses || []).map(s => `<li>${s}</li>`).join('') || '<li>無</li>';
  recoList.innerHTML = (analysis.recommendations || []).map(s => `<li>${s}</li>`).join('') || '<li>無</li>';
}

function renderSnapshot(snap) {
  document.getElementById('lastUpdated').textContent = snap.date;
  document.getElementById('brandLine').textContent = `PowerHero 勁漢英雄 ｜ ${snap.indicators.length} 項指標 · ${(snap.indicators[0]?.rows || []).length} 筆資料`;

  renderTrends(snap.trends);
  renderSwot(snap.powerHeroAnalysis);

  let activeIndex = 0;
  function show(i) {
    activeIndex = i;
    renderDial(snap.indicators, activeIndex, show);
    renderPanel(snap.indicators[activeIndex]);
  }
  show(0);

  const logList = document.getElementById('logList');
  function paintLog(filter) {
    const rows = (snap.log || []).filter(l => filter === 'all' || l.severity === filter);
    logList.innerHTML = rows.map(l => `
      <div class="log-row" data-severity="${l.severity}">
        <div class="date">${l.date}</div>
        <div class="who">${l.competitor}</div>
        <div class="change">${l.change}</div>
        <div class="sev-tag sev-${l.severity}">${l.severity === 'high' ? '高' : l.severity === 'medium' ? '中' : '低'}</div>
      </div>
    `).join('') || `<div class="log-row"><div class="change" style="color:var(--paper-dim);">這個篩選條件下沒有紀錄</div></div>`;
  }
  paintLog('all');

  document.querySelectorAll('#filters button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      paintLog(btn.dataset.sev);
    });
  });
}

function render(data) {
  const snapshots = (data.snapshots || []).slice().sort((a, b) => a.date.localeCompare(b.date));
  if (snapshots.length === 0) {
    document.getElementById('brandLine').textContent = '尚無資料';
    return;
  }

  const allMonths = [...new Set(snapshots.map(s => s.month))].sort();
  let activeMonth = allMonths[allMonths.length - 1];
  let activeDate = null;

  function pickMonth(month) {
    activeMonth = month;
    const inMonth = snapshots.filter(s => s.month === activeMonth);
    activeDate = inMonth[inMonth.length - 1].date; // 預設該月最新一筆
    renderMonthRow(allMonths, activeMonth, pickMonth);
    renderDateRow(inMonth, activeDate, pickDate);
    renderSnapshot(inMonth.find(s => s.date === activeDate));
  }

  function pickDate(date) {
    activeDate = date;
    const inMonth = snapshots.filter(s => s.month === activeMonth);
    renderDateRow(inMonth, activeDate, pickDate);
    renderSnapshot(snapshots.find(s => s.date === activeDate));
  }

  pickMonth(activeMonth);
}

loadData().then(render);
</script>
</body>
</html>
