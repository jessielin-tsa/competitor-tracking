name: Auto-merge claude branches
on:
  push:
    branches:
      - 'claude/**'
permissions:
  contents: write
jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate JSON files
        run: |
          git checkout ${GITHUB_REF_NAME}
          for f in tracking-data.json price-history.json; do
            if [ -f "$f" ]; then python3 -m json.tool "$f" > /dev/null || exit 1; fi
          done
      - name: Merge into main and delete branch
        run: |
          git config user.name "auto-merge-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout main
          git merge --no-ff ${GITHUB_REF_NAME} -m "Auto-merge ${GITHUB_REF_NAME}"
          git push origin main
          git push origin --delete ${GITHUB_REF_NAME}
